<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון - מערכת משולבת</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { border-bottom-color: #3b82f6; color: #3b82f6; }
        .tab-inactive { border-bottom-color: transparent; color: #6b7280; }
        .inspiration-bg { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl"><i class="fa-solid fa-house-chimney text-lg"></i></div>
                <h1 class="text-xl font-bold text-gray-800">משפחת מטמון</h1>
            </div>
            <div id="cloud-status" class="text-sm font-medium text-gray-400 flex items-center gap-1">
                <i class="fa-solid fa-cloud"></i> מנותק
            </div>
        </div>
        <div class="max-w-3xl mx-auto px-4 border-t border-gray-100 bg-white">
            <nav class="flex gap-6 h-12">
                <button onclick="switchTab('today')" id="tab-btn-today" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-calendar-day"></i> היום</button>
                <button onclick="switchTab('tasks')" id="tab-btn-tasks" class="tab-active font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-list-check"></i> משימות</button>
                <button onclick="switchTab('timer')" id="tab-btn-timer" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-stopwatch"></i> טיימר</button>
                <button onclick="openPinModal()" id="tab-btn-admin" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2 text-red-600"><i class="fa-solid fa-lock"></i> הורים</button>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">
        <div class="inspiration-bg rounded-2xl p-4 border border-amber-200 shadow-sm text-center mb-6">
            <p id="top-quote-text" class="text-gray-700 font-medium italic">"גם צעדים קטנים מובילים להצלחות גדולות ✨"</p>
        </div>

        <div id="view-today" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-4"><i class="fa-solid fa-calendar-check text-blue-500"></i> לו"ז להיום</h2>
                <div id="today-tasks-container" class="space-y-3"></div>
            </div>
        </div>

        <div id="view-tasks" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-4"><i class="fa-solid fa-plus text-blue-500"></i> הוספת משימה אישית</h2>
                <form onsubmit="return false;" autocomplete="off" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="sm:col-span-2">
                        <input type="text" id="task-title" autocomplete="off" placeholder="מה צריך לעשות?" class="w-full border rounded-xl px-4 py-2.5 outline-none">
                    </div>
                    <div><input type="date" id="task-date" class="w-full border rounded-xl px-4 py-2.5 outline-none"></div>
                    <div><input type="time" id="task-time" class="w-full border rounded-xl px-4 py-2.5 outline-none"></div>
                    <div>
                        <select id="task-reminder" class="w-full border rounded-xl px-4 py-2.5 bg-white">
                            <option value="-1">ללא תזכורת</option>
                            <option value="0">בזמן המשימה</option>
                            <option value="5">5 דקות לפני</option>
                            <option value="15">15 דקות לפני</option>
                        </select>
                    </div>
                    <div>
                        <select id="task-sound" class="w-full border rounded-xl px-4 py-2.5 bg-white">
                            <option value="speech">הקראת שם קולית</option>
                            <option value="classic">מנגינה קלאסית (5 שניות)</option>
                            <option value="bell">פעמון (3 שניות)</option>
                        </select>
                    </div>
                </form>
                <div class="mt-5">
                    <button onclick="saveTask()" class="w-full bg-blue-600 text-white px-4 py-3 rounded-xl font-bold">שמור למשימות שלי</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">המשימות שלי</h2>
                <div id="tasks-container" class="space-y-3"></div>
            </div>
        </div>

        <div id="view-timer" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border p-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4"><i class="fa-solid fa-stopwatch text-indigo-500"></i> טיימר משפחתי מחזורי</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">זמן כולל (בדקות)</label>
                        <input type="number" id="timer-total" value="20" class="w-full border rounded-xl p-3 text-center font-bold text-xl">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">התראת ביניים (כל X דקות)</label>
                        <input type="number" id="timer-interval" value="5" class="w-full border rounded-xl p-3 text-center font-bold text-xl">
                    </div>
                </div>
                <div class="bg-slate-900 text-white rounded-2xl p-6 text-
