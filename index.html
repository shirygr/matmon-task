<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { border-bottom-color: #3b82f6; color: #3b82f6; }
        .tab-inactive { border-bottom-color: transparent; color: #6b7280; }
        .inspiration-bg { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl"><i class="fa-solid fa-layer-group text-lg"></i></div>
                <h1 class="text-xl font-bold text-gray-800">משפחת מטמון</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="cloud-status" class="text-sm font-medium text-gray-400 flex items-center gap-1"><i class="fa-solid fa-cloud"></i> מנותק</div>
            </div>
        </div>
        <div class="max-w-3xl mx-auto px-4 border-t border-gray-100 bg-white">
            <nav class="flex gap-4 sm:gap-8 h-12">
                <button onclick="switchTab('today')" id="tab-btn-today" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-calendar-day"></i> היום</button>
                <button onclick="switchTab('tasks')" id="tab-btn-tasks" class="tab-active font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-list-check"></i> משימות</button>
                <button onclick="switchTab('timer')" id="tab-btn-timer" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-stopwatch"></i> טיימר</button>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div id="view-today" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2"><i class="fa-solid fa-calendar-day text-blue-500"></i> לו"ז להיום</h2>
                <div id="today-parent-filter" class="hidden w-full mb-4 bg-purple-50 p-3 rounded-xl border flex items-center justify-between">
                    <span class="text-sm font-medium text-purple-800"><i class="fa-solid fa-filter"></i> הצג של:</span>
                    <select id="today-filter-user" onchange="renderTodayTasks()" class="border rounded-lg px-3 py-1.5 text-sm bg-white"></select>
                </div>
                <div id="today-tasks-container" class="space-y-3">
                    <div class="text-center text-gray-500 py-8" id="empty-today-tasks"><p>אין משימות להיום.</p></div>
                </div>
            </div>
        </div>

        <div id="view-tasks" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2" id="form-title"><i class="fa-solid fa-plus-circle text-blue-500"></i> משימה חדשה</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div id="parent-assign-container" class="sm:col-span-2 hidden bg-purple-50 p-4 rounded-xl border">
                        <label class="block text-sm font-medium text-purple-800 mb-2">למי המשיוך?</label>
                        <div class="flex gap-2">
                            <select id="task-assignee" class="flex-grow border rounded-xl px-4 py-2 bg-white"><option value="me">לי</option></select>
                            <input type="text" id="task-new-assignee" placeholder="שם חדש..." class="flex-grow border rounded-xl px-4 py-2 hidden">
                            <button type="button" onclick="toggleNewAssignee()" class="bg-purple-200 text-purple-800 px-4 py-2 rounded-xl text-sm">חדש</button>
                        </div>
                    </div>
                    <div class="sm:col-span-2">
                        <input type="text" id="task-title" placeholder="כותרת המשימה..." class="w-full border rounded-xl px-4 py-2.5 outline-none">
                    </div>
                    <div><input type="date" id="task-date" class="w-full border rounded-xl px-4 py-2.5 outline-none"></div>
                    <div><input type="time" id="task-time" class="w-full border rounded-xl px-4 py-2.5 outline-none"></div>
                    <div>
                        <select id="task-reminder" class="w-full border rounded-xl px-4 py-2.5 bg-white">
                            <option value="-1">ללא תזכורת</option>
                            <option value="0">בזמן המשימה</option>
                            <option value="5">5 דקות לפני</option>
                            <option value="15">15 דקות לפני</option>
                        </select>
                    </div>
                    <div>
                        <select id="task-sound" class="w-full border rounded-xl px-4 py-2.5 bg-white">
                            <option value="speech">הקראת שם קולית (עברית)</option>
                            <option value="classic">קלאסי</option>
                            <option value="bell">פעמון</option>
                            <option value="long5">ממושך (5 שניות)</option>
                        </select>
                    </div>
                    <div>
                        <select id="task-recurrence" onchange="toggleRecurrenceDays()" class="w-full border rounded-xl px-4 py-2.5 bg-white"><option value="none">חד פעמי</option><option value="daily">כל יום</option><option value="weekly">בימים נבחרים</option></select>
                    </div>
                    <div id="recurrence-days" class="sm:col-span-2 hidden bg-gray-50 p-3 rounded-xl border">
                        <div class="flex flex-wrap gap-2">
                            <label><input type="checkbox" value="0" class="recurrence-day"> א'</label>
                            <label><input type="checkbox" value="1" class="recurrence-day"> ב'</label>
                            <label><input type="checkbox" value="2" class="recurrence-day"> ג'</label>
                            <label><input type="checkbox" value="3" class="recurrence-day"> ד'</label>
                            <label><input type="checkbox" value="4" class="recurrence-day"> ה'</label>
                            <label><input type="checkbox" value="5" class="recurrence-day"> ו'</label>
                            <label><input type="checkbox" value="6" class="recurrence-day"> ש'</label>
                        </div>
                    </div>
                </div>
                <div class="mt-5 flex gap-3">
                    <button id="btn-save-task" onclick="saveTask()" class="flex-grow bg-blue-600 text-white px-4 py-2.5 rounded-xl font-medium">שמור משימה</button>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden bg-gray-200 text-gray-700 px-4 py-2.5 rounded-xl">ביטול</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">רשימת משימות</h2>
                    <button id="btn-parent-mode" onclick="openPinModal()" class="text-sm text-gray-500 flex items-center gap-1"><i class="fa-solid fa-lock"></i> מצב הורה</button>
                </div>
                <div id="tasks-parent-filter" class="hidden w-full mb-4 bg-purple-50 p-3 rounded-xl border">
                    <select id="task-filter-user" onchange="renderTasks()" class="border rounded-lg px-3 py-1.5 text-sm bg-white"></select>
                </div>
                <div id="tasks-container" class="space-y-3">
                    <div class="text-center text-gray-500 py-8" id="empty-tasks"><p>אין משימות קרובות.</p></div>
                </div>
            </div>
        </div>

        <div id="view-timer" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4"><i class="fa-solid fa-stopwatch text-indigo-500"></i> טיימר חכם</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><label class="block text-sm text-gray-600 mb-1">כולל (דקות)</label><input type="number" id="timer-total" value="20" class="w-full border rounded-xl p-2 text-center font-bold"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">צלצל כל (דקות)</label><input type="number" id="timer-interval" value="5" class="w-full border rounded-xl p-2 text-center font-bold"></div>
                </div>
                <div class="bg-gray-50 rounded-2xl p-6 text-center border mb-6">
                    <div id="display-total" class="text-5xl font-black text-gray-800 mb-2" style="direction: ltr;">00:00</div>
                    <div id="display-interval" class="text-2xl font-bold text-indigo-600" style="direction: ltr;">00:00</div>
                </div>
                <div class="flex justify-center gap-4">
                    <button id="btn-timer-start" onclick="startTimer()" class="bg-indigo-600 text-white h-14 w-14 rounded-full"><i class="fa-solid fa-play"></i></button>
                    <button id="btn-timer-pause" onclick="pauseTimer()" class="bg-yellow-500 text-white h-14 w-14 rounded-full hidden"><i class="fa-solid fa-pause"></i></button>
                    <button onclick="resetTimer()" class="bg-gray-200 text-gray-700 h-14 w-14 rounded-full"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div id="inspiration-modal" class="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="inspiration-bg rounded-3xl max-w-sm w-full p-6 text-center border-4 border-white">
            <h3 class="text-xl font-black text-gray-800 mb-4">השראה יומית קסומה ✨</h3>
            <p id="daily-quote-text" class="text-lg text-gray-700 font-medium leading-relaxed mb-6"></p>
            <button onclick="closeInspiration()" class="w-full bg-yellow-400 text-yellow-900 font-bold py-2 rounded-xl">המשך לאפליקציה</button>
        </div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-gray-900/50 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm" id="custom-modal-content">
            <h3 class="text-xl font-bold mb-2" id="modal-title">כותרת</h3>
            <p class="text-gray-600 mb-6" id="modal-text">תוכן</p>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white py-2 rounded-lg">הבנתי</button>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-gray-900/50 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h3 class="text-xl font-bold text-center mb-2">מצב הורה</h3>
            <p class="text-gray-500 mb-6 text-sm text-center">סיסמה: 1234</p>
            <input type="password" id="pin-input" class="w-full border rounded-xl px-4 py-3 mb-6 text-center text-2xl tracking-[0.5em] font-mono">
            <div class="flex gap-3">
                <button onclick="submitPin()" class="flex-grow bg-purple-600 text-white py-3 rounded-xl font-bold">אישור</button>
                <button onclick="closePinModal()" class="bg-gray-200 text-gray-700 px-4 py-3 rounded-xl font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <div id="user-setup-modal" class="fixed inset-0 bg-gray-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-md hidden transition-opacity">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden">
            <div class="pt-8 px-6 pb-8 text-center">
                <h3 class="text-2xl font-bold mb-2">ברוכים הבאים!</h3>
                <p class="text-gray-500 mb-6 text-sm">איך קוראים לך?</p>
                <input type="text" id="user-name-input" placeholder="למשל: אבא" class="w-full px-4 py-3 bg-gray-50 border rounded-xl mb-6 text-right font-medium">
                <button onclick="saveUserName()" class="w-full py-3.5 bg-blue-600 text-white font-bold rounded-xl shadow-md">בואו נתחיל</button>
            </div>
        </div>
    </div>

    <script>
        const inspirationQuotes = [
            "כל יום הוא הרפתקה חדשה שמחכה רק לך.", "החיוך שלך עושה את העולם יפה יותר.",
            "את/ה יכול/ה לעשות דברים מדהימים היום!", "לטעות זה בסדר, ככה אנחנו לומדים וגדלים.",
            "את/ה אמיץ/ה, חכם/ה ואהוב/ה מאוד.", "גם צעדים קטנים מובילים להצלחות גדולות.",
            "אין עוד אף אחד בעולם בדיוק כמוך, וזה הכוח שלך.", "תודה שאת/ה חלק ממשפחת מטמון!",
            "כשאנחנו יחד, שום דבר לא יכול לעצור אותנו.", "יש בך קסם שאין לאף אחד אחר."
        ];

        let synth = null, synths = {}, tasks = [], editingTaskId = null;
        let currentUserName = localStorage.getItem('matmon_user_name') || "";
        let parentMode = false;
        let timerTotalSeconds = 0, timerIntervalSeconds = 0, timerObj = null, remainingTotal = 0, remainingInterval = 0;

        window.getUserId = function()
