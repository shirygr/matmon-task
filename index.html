<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { border-bottom-color: #3b82f6; color: #3b82f6; }
        .tab-inactive { border-bottom-color: transparent; color: #6b7280; }
        .inspiration-bg { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl"><i class="fa-solid fa-layer-group text-lg"></i></div>
                <h1 class="text-xl font-bold text-gray-800">משפחת מטמון</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="cloud-status" class="text-sm font-medium text-gray-400 flex items-center gap-1"><i class="fa-solid fa-cloud"></i> מנותק</div>
            </div>
        </div>
        <div class="max-w-3xl mx-auto px-4 border-t border-gray-100 bg-white">
            <nav class="flex gap-4 sm:gap-8 h-12">
                <button onclick="switchTab('today')" id="tab-btn-today" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-calendar-day"></i> היום</button>
                <button onclick="switchTab('tasks')" id="tab-btn-tasks" class="tab-active font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-list-check"></i> משימות</button>
                <button onclick="switchTab('timer')" id="tab-btn-timer" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-stopwatch"></i> טיימר</button>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div id="view-today" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2"><i class="fa-solid fa-calendar-day text-blue-500"></i> לו"ז להיום</h2>
                <div id="today-parent-filter" class="hidden w-full mb-4 bg-purple-50 p-3 rounded-xl border flex items-center justify-between">
                    <span class="text-sm font-medium text-purple-800"><i class="fa-solid fa-filter"></i> הצג של:</span>
                    <select id="today-filter-user" onchange="renderTodayTasks()" class="border rounded-lg px-3 py-1.5 text-sm bg-white"></select>
                </div>
                <div id="today-tasks-container" class="space-y-3">
                    <div class="text-center text-gray-500 py-8" id="empty-today-tasks"><p>אין משימות להיום.</p></div>
                </div>
            </div>
        </div>

        <div id="view-tasks" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2" id="form-title"><i class="fa-solid fa-plus-circle text-blue-500"></i> משימה חדשה</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div id="parent-assign-container" class="sm:col-span-2 hidden bg-purple-50 p-4 rounded-xl border">
                        <label class="block text-sm font-medium text-purple-800 mb-2">למי המשיוך?</label>
                        <div class="flex gap-2">
                            <select id="task-assignee" class="flex-grow border rounded-xl px-4 py-2 bg-white"><option value="me">לי</option></select>
                            <input type="text" id="task-new-assignee" placeholder="שם חדש..." class="flex-grow border rounded-xl px-4 py-2 hidden">
                            <button type="button" onclick="toggleNewAssignee()" class="bg-purple-200 text-purple-800 px-4 py-2 rounded-xl text-sm">חדש</button>
                        </div>
                    </div>
                    <div class="sm:col-span-2">
                        <input type="text" id="task-title" placeholder="כותרת המשימה..." class="w-full border rounded-xl px-4 py-2.5 outline-none">
                    </div>
                    <div><input type="date" id="task-date" class="w-full border rounded-xl px-4 py-2.5 outline-none"></div>
                    <div><input type="time" id="task-time" class="w-full border rounded-xl px-4 py-2.5 outline-none"></div>
                    <div>
                        <select id="task-reminder" class="w-full border rounded-xl px-4 py-2.5 bg-white">
                            <option value="-1">ללא תזכורת</option>
                            <option value="0">בזמן המשימה</option>
                            <option value="5">5 דקות לפני</option>
                            <option value="15">15 דקות לפני</option>
                        </select>
                    </div>
                    <div>
                        <select id="task-sound" class="w-full border rounded-xl px-4 py-2.5 bg-white">
                            <option value="speech">הקראת שם קולית (עברית)</option>
                            <option value="classic">קלאסי</option>
                            <option value="bell">פעמון</option>
                            <option value="long5">ממושך (5 שניות)</option>
                        </select>
                    </div>
                    <div>
                        <select id="task-recurrence" onchange="toggleRecurrenceDays()" class="w-full border rounded-xl px-4 py-2.5 bg-white"><option value="none">חד פעמי</option><option value="daily">כל יום</option><option value="weekly">בימים נבחרים</option></select>
                    </div>
                    <div id="recurrence-days" class="sm:col-span-2 hidden bg-gray-50 p-3 rounded-xl border">
                        <div class="flex flex-wrap gap-2">
                            <label><input type="checkbox" value="0" class="recurrence-day"> א'</label>
                            <label><input type="checkbox" value="1" class="recurrence-day"> ב'</label>
                            <label><input type="checkbox" value="2" class="recurrence-day"> ג'</label>
                            <label><input type="checkbox" value="3" class="recurrence-day"> ד'</label>
                            <label><input type="checkbox" value="4" class="recurrence-day"> ה'</label>
                            <label><input type="checkbox" value="5" class="recurrence-day"> ו'</label>
                            <label><input type="checkbox" value="6" class="recurrence-day"> ש'</label>
                        </div>
                    </div>
                </div>
                <div class="mt-5 flex gap-3">
                    <button id="btn-save-task" onclick="saveTask()" class="flex-grow bg-blue-600 text-white px-4 py-2.5 rounded-xl font-medium">שמור משימה</button>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden bg-gray-200 text-gray-700 px-4 py-2.5 rounded-xl">ביטול</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">רשימת משימות</h2>
                    <button id="btn-parent-mode" onclick="openPinModal()" class="text-sm text-gray-500 flex items-center gap-1"><i class="fa-solid fa-lock"></i> מצב הורה</button>
                </div>
                <div id="tasks-parent-filter" class="hidden w-full mb-4 bg-purple-50 p-3 rounded-xl border">
                    <select id="task-filter-user" onchange="renderTasks()" class="border rounded-lg px-3 py-1.5 text-sm bg-white"></select>
                </div>
                <div id="tasks-container" class="space-y-3">
                    <div class="text-center text-gray-500 py-8" id="empty-tasks"><p>אין משימות קרובות.</p></div>
                </div>
            </div>
        </div>

        <div id="view-timer" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4"><i class="fa-solid fa-stopwatch text-indigo-500"></i> טיימר חכם</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><label class="block text-sm text-gray-600 mb-1">כולל (דקות)</label><input type="number" id="timer-total" value="20" class="w-full border rounded-xl p-2 text-center font-bold"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">צלצל כל (דקות)</label><input type="number" id="timer-interval" value="5" class="w-full border rounded-xl p-2 text-center font-bold"></div>
                </div>
                <div class="bg-gray-50 rounded-2xl p-6 text-center border mb-6">
                    <div id="display-total" class="text-5xl font-black text-gray-800 mb-2" style="direction: ltr;">00:00</div>
                    <div id="display-interval" class="text-2xl font-bold text-indigo-600" style="direction: ltr;">00:00</div>
                </div>
                <div class="flex justify-center gap-4">
                    <button id="btn-timer-start" onclick="startTimer()" class="bg-indigo-600 text-white h-14 w-14 rounded-full"><i class="fa-solid fa-play"></i></button>
                    <button id="btn-timer-pause" onclick="pauseTimer()" class="bg-yellow-500 text-white h-14 w-14 rounded-full hidden"><i class="fa-solid fa-pause"></i></button>
                    <button onclick="resetTimer()" class="bg-gray-200 text-gray-700 h-14 w-14 rounded-full"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div id="inspiration-modal" class="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="inspiration-bg rounded-3xl max-w-sm w-full p-6 text-center border-4 border-white">
            <h3 class="text-xl font-black text-gray-800 mb-4">השראה יומית קסומה ✨</h3>
            <p id="daily-quote-text" class="text-lg text-gray-700 font-medium leading-relaxed mb-6"></p>
            <button onclick="closeInspiration()" class="w-full bg-yellow-400 text-yellow-900 font-bold py-2 rounded-xl">המשך לאפליקציה</button>
        </div>
    </div>

    <script>
        const inspirationQuotes = [
            "כל יום הוא הרפתקה חדשה שמחכה רק לך.", "החיוך שלך עושה את העולם יפה יותר.",
            "את/ה יכול/ה לעשות דברים מדהימים היום!", "לטעות זה בסדר, ככה אנחנו לומדים וגדלים.",
            "את/ה אמיץ/ה, חכם/ה ואהוב/ה מאוד.", "גם צעדים קטנים מובילים להצלחות גדולות.",
            "אין עוד אף אחד בעולם בדיוק כמוך, וזה הכוח שלך.", "תודה שאת/ה חלק ממשפחת מטמון!",
            "כשאנחנו יחד, שום דבר לא יכול לעצור אותנו.", "יש בך קסם שאין לאף אחד אחר."
            // המערכת משתמשת באינדקס קבוע לפי ימי השנה
        ];

        let synth = null, synths = {}, tasks = [], editingTaskId = null;
        let currentUserName = localStorage.getItem('matmon_user_name') || "";
        let parentMode = false;
        let timerTotalSeconds = 0, timerIntervalSeconds = 0, timerObj = null, remainingTotal = 0, remainingInterval = 0;

        window.getUserId = function() {
            if (window.firebaseInitialized && window.firebaseUid) return window.firebaseUid;
            let uid = localStorage.getItem('matmon_local_uid') || 'local_' + Date.now();
            localStorage.setItem('matmon_local_uid', uid);
            return uid;
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (!currentUserName) document.getElementById('user-setup-modal').classList.remove('hidden');
            else checkDailyInspiration();
            loadTasks();
            
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
            
            // הגנה ואופטימיזציה לפעילות ברקע / חזרה למסך
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    loadTasks(); // סנכרון כפוי בעת פתיחת המסך
                }
            });

            setInterval(checkReminders, 4000); // בדיקה מהירה של תזכורות
        });

        function checkDailyInspiration() {
            const todayStr = new Date().toISOString().split('T')[0];
            if (localStorage.getItem('matmon_last_insp') !== todayStr) {
                const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
                document.getElementById('daily-quote-text').textContent = inspirationQuotes[dayOfYear % inspirationQuotes.length];
                document.getElementById('inspiration-modal').classList.remove('opacity-0', 'pointer-events-none');
                localStorage.setItem('matmon_last_insp', todayStr);
            }
        }
        function closeInspiration() { document.getElementById('inspiration-modal').classList.add('opacity-0', 'pointer-events-none'); }

        function initAudio() { 
            if (!synth) { 
                synth = new Tone.Synth().toDestination(); 
                synths.classic = synth;
                synths.bell = new Tone.Synth({ oscillator: { type: "sine" } }).toDestination();
                synths.digital = new Tone.Synth({ oscillator: { type: "square" } }).toDestination();
            } 
        }

        function playSound(type, isEnd = false, taskTitle = "") {
            initAudio(); Tone.start(); const now = Tone.now();
            if (type === 'speech' && 'speechSynthesis' in window) {
                synths.bell.triggerAttackRelease("C5", "8n", now);
                setTimeout(() => {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance("הגיע הזמן למשימה " + taskTitle);
                    u.lang = 'he-IL'; u.rate = 0.9; window.speechSynthesis.speak(u);
                }, 500);
                return;
            }
            if (type === 'long5') {
                for (let i = 0; i < 15; i++) synths.digital.triggerAttackRelease("C6", "16n", now + i * 0.3);
                return;
            }
            let s = type === 'bell' ? synths.bell : synths.classic;
            s.triggerAttackRelease(isEnd ? "G5" : "E5", "4n", now);
        }

        function switchTab(tabId) {
            ['today', 'tasks', 'timer'].forEach(id => {
                document.getElementById(`view-${id}`).classList.add('hidden');
                document.getElementById(`tab-btn-${id}`).className = 'tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2';
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tabId}`).className = 'tab-active font-medium h-full px-2 border-b-2 flex items-center gap-2';
        }

        function openPinModal() {
            if (parentMode) { parentMode = false; updateParentUI(); return; }
            document.getElementById('pin-input').value = '';
            document.getElementById('pin-modal').classList.remove('opacity-0', 'pointer-events-none');
        }
        function closePinModal() { document.getElementById('pin-modal').classList.add('opacity-0', 'pointer-events-none'); }
        function submitPin() { if (document.getElementById('pin-input').value === "1234") { parentMode = true; closePinModal(); updateParentUI(); renderTasks(); renderTodayTasks(); } }

        function updateParentUI() {
            const btn = document.getElementById('btn-parent-mode');
            document.getElementById('parent-assign-container').classList.toggle('hidden', !parentMode);
            document.getElementById('tasks-parent-filter').classList.toggle('hidden', !parentMode);
            document.getElementById('today-parent-filter').classList.toggle('hidden', !parentMode);
            if (parentMode) { btn.textContent = "מצב הורה (פעיל)"; populateUserDropdowns(); }
            else btn.textContent = "מצב הורה";
        }

        function populateUserDropdowns() {
            const users = new Map(); users.set(window.getUserId(), currentUserName || "אני");
            tasks.forEach(t => { if (t.ownerId) users.set(t.ownerId, t.ownerName); });
            const opt = `<option value="all">כל המשפחה</option>` + Array.from(users).map(([id, name]) => `<option value="${id}">${name}</option>`).join('');
            document.getElementById('task-filter-user').innerHTML = opt;
            document.getElementById('today-filter-user').innerHTML = opt;
            document.getElementById('task-assignee').innerHTML = `<option value="me">לי</option>` + Array.from(users).filter(([id])=>id!==window.getUserId()).map(([id, name]) => `<option value="${id}">${name}</option>`).join('');
        }

        function toggleNewAssignee() {
            document.getElementById('task-assignee').classList.toggle('hidden');
            document.getElementById('task-new-assignee').classList.toggle('hidden');
        }

        function loadTasks() { try { tasks = JSON.parse(localStorage.getItem('matmon_tasks')) || []; } catch(e){} renderTasks(); renderTodayTasks(); }
        function saveTasks() { localStorage.setItem('matmon_tasks', JSON.stringify(tasks)); }

        window.updateTasksFromCloud = function(cloudTasks) { tasks = cloudTasks; saveTasks(); renderTasks(); renderTodayTasks(); if(parentMode) populateUserDropdowns(); };

        function saveTask() {
            const title = document.getElementById('task-title').value.trim(), date = document.getElementById('task-date').value, time = document.getElementById('task-time').value;
            if (!title || !date || !time) return;
            
            let oid = window.getUserId(), oname = currentUserName;
            if (parentMode) {
                const inp = document.getElementById('task-new-assignee');
                const sel = document.getElementById('task-assignee');
                if (!inp.classList.contains('hidden') && inp.value.trim()) { oname = escapeHTML(inp.value.trim()); oid = 'user_' + Date.now(); }
                else if (sel.value !== 'me') { oid = sel.value; oname = sel.options[sel.selectedIndex].text; }
            }

            const taskData = {
                id: editingTaskId || Date.now().toString(), title: escapeHTML(title), date, time,
                reminderOffset: document.getElementById('task-reminder').value, sound: document.getElementById('task-sound').value,
                recurrenceType: document.getElementById('task-recurrence').value, notified: false, isCompleted: false, ownerId: oid, ownerName: oname
            };

            if (editingTaskId) { const idx = tasks.findIndex(t => t.id === editingTaskId); tasks[idx] = taskData; cancelEdit(); }
            else tasks.push(taskData);

            saveTasks(); renderTasks(); renderTodayTasks();
            if (window.saveTaskToCloud) window.saveTaskToCloud(taskData);
            document.getElementById('task-title').value = '';
        }

        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); saveTasks(); if(window.deleteTaskFromCloud) window.deleteTaskFromCloud(id); renderTasks(); renderTodayTasks(); }
        function completeTask(id) { const t = tasks.find(x => x.id === id); t.isCompleted = true; saveTasks(); if(window.saveTaskToCloud) window.saveTaskToCloud(t); renderTasks(); renderTodayTasks(); }
        function cancelEdit() { editingTaskId = null; document.getElementById('btn-save-task').textContent = 'שמור משימה'; document.getElementById('btn-cancel-edit').classList.add('hidden'); }

        function renderTasks() {
            const container = document.getElementById('tasks-container'); container.innerHTML = '';
            const filterId = parentMode ? document.getElementById('task-filter-user').value : 'all';
            const toRender = tasks.filter(t => !parentMode ? t.ownerId === window.getUserId() : (filterId === 'all' || t.ownerId === filterId));
            toRender.forEach(t => {
                const div = document.createElement('div'); div.className = "p-3 border rounded-xl flex justify-between bg-white items-center shadow-sm";
                div.innerHTML = `<div><div class="font-bold">${t.title} ${parentMode?`<span class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">${t.ownerName}</span>`:''}</div><div class="text-xs text-gray-400">${t.date} | ${t.time}</div></div>
                <div class="flex gap-1"><button onclick="completeTask('${t.id}')" class="text-green-600 p-2"><i class="fa-solid fa-check"></i></button><button onclick="deleteTask('${t.id}')" class="text-red-500 p-2"><i class="fa-solid fa-trash"></i></button></div>`;
                container.appendChild(div);
            });
        }

        function renderTodayTasks() {
            const container = document.getElementById('today-tasks-container'); container.innerHTML = '';
            const todayStr = new Date().toISOString().split('T')[0];
            const filterId = parentMode ? document.getElementById('today-filter-user').value : 'all';
            const toRender = tasks.filter(t => t.date === todayStr && (!parentMode ? t.ownerId === window.getUserId() : (filterId === 'all' || t.ownerId === filterId)));
            toRender.forEach(t => {
                const div = document.createElement('div'); div.className = "p-3 border rounded-xl bg-blue-50/50 flex justify-between items-center";
                div.innerHTML = `<div><div class="font-bold text-blue-900">${t.title}</div><div class="text-xs text-blue-600">${t.time}</div></div>`;
                container.appendChild(div);
            });
        }

        function checkReminders() {
            const now = new Date(); const myId = window.getUserId();
            tasks.forEach(t => {
                if (t.ownerId !== myId || t.notified || t.isCompleted || t.reminderOffset === '-1') return;
                const taskTime = new Date(`${t.date}T${t.time}`);
                if (now >= (taskTime - t.reminderOffset * 60000) && now <= taskTime) {
                    playSound(t.sound, false, t.title);
                    if ("Notification" in window && Notification.permission === "granted") {
                        navigator.serviceWorker.ready.then(reg => {
                            reg.showNotification("משפחת מטמון: " + t.title, { body: `זמן ביצוע: ${t.time}`, icon: "./icon-192x192.png", requireInteraction: true });
                        });
                    }
                    t.notified = true; saveTasks();
                    if (window.saveTaskToCloud) window.saveTaskToCloud(t);
                }
            });
        }

        // טיימר חכם משוחזר
        function startTimer() {
            if (timerObj) return;
            if (remainingTotal === 0) {
                remainingTotal = parseInt(document.getElementById('timer-total').value) * 60;
                remainingInterval = parseInt(document.getElementById('timer-interval').value) * 60;
            }
            timerObj = setInterval(() => {
                remainingTotal--; remainingInterval--;
                document.getElementById('display-total').textContent = Math.floor(remainingTotal/60).toString().padStart(2,'0') + ":" + (remainingTotal%60).toString().padStart(2,'0');
                document.getElementById('display-interval').textContent = Math.floor(remainingInterval/60).toString().padStart(2,'0') + ":" + (remainingInterval%60).toString().padStart(2,'0');
                if (remainingInterval <= 0 && remainingTotal > 0) { playSound(document.getElementById('timer-sound').value); remainingInterval = parseInt(document.getElementById('timer-interval').value) * 60; }
                if (remainingTotal <= 0) { playSound(document.getElementById('timer-sound').value, true); resetTimer(); }
            }, 1000);
            document.getElementById('btn-timer-start').classList.add('hidden');
            document.getElementById('btn-timer-pause').classList.remove('hidden');
        }
        function pauseTimer() { clearInterval(timerObj); timerObj = null; document.getElementById('btn-timer-start').classList.remove('hidden'); document.getElementById('btn-timer-pause').classList.add('hidden'); }
        function resetTimer() { pauseTimer(); remainingTotal = 0; remainingInterval = 0; document.getElementById('display-total').textContent = "00:00"; document.getElementById('display-interval').textContent = "00:00"; }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
