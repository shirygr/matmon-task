<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { border-bottom-color: #3b82f6; color: #3b82f6; }
        .tab-inactive { border-bottom-color: transparent; color: #6b7280; }
        .inspiration-bg { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl">
                    <i class="fa-solid fa-layer-group text-lg"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">משפחת מטמון</h1>
            </div>
            <div class="flex items-center gap-4">
                <!-- חיווי חיבור לענן -->
                <div id="cloud-status" class="text-sm font-medium text-gray-400 flex items-center gap-1" title="בודק חיבור...">
                    <i class="fa-solid fa-cloud"></i> מנותק
                </div>
            </div>
        </div>
        <div class="max-w-3xl mx-auto px-4 border-t border-gray-100 bg-white">
            <nav class="flex gap-4 sm:gap-8 h-12" id="main-nav">
                <button onclick="switchTab('today')" id="tab-btn-today" class="tab-inactive font-medium h-full px-2 border-b-2 hover:text-blue-600 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-calendar-day"></i> <span class="hidden sm:inline">היום</span>
                </button>
                <button onclick="switchTab('tasks')" id="tab-btn-tasks" class="tab-active font-medium h-full px-2 border-b-2 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-list-check"></i> <span class="hidden sm:inline">משימות</span>
                </button>
                <button onclick="switchTab('timer')" id="tab-btn-timer" class="tab-inactive font-medium h-full px-2 border-b-2 hover:text-blue-600 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-stopwatch"></i> <span class="hidden sm:inline">טיימר</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <!-- Today Tasks Section -->
        <div id="view-today" class="hidden space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 sm:p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-2">
                        <i class="fa-solid fa-calendar-day text-blue-500"></i> לו"ז להיום
                    </h2>
                </div>
                <div id="today-parent-filter" class="hidden w-full mb-4 bg-purple-50 p-3 rounded-xl border border-purple-100 flex items-center justify-between">
                    <span class="text-sm font-medium text-purple-800"><i class="fa-solid fa-filter"></i> הצג לו"ז של:</span>
                    <select id="today-filter-user" onchange="renderTodayTasks()" class="border border-purple-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-purple-500 bg-white">
                        <option value="all">כל המשפחה</option>
                    </select>
                </div>
                <div id="today-tasks-container" class="space-y-3">
                    <div class="text-center text-gray-500 py-8 hidden" id="empty-today-tasks">
                        <i class="fa-solid fa-mug-hot text-4xl mb-3 text-gray-300"></i>
                        <p>אין משימות להיום.<br>המשך יום נעים!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tasks Section -->
        <div id="view-tasks" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 sm:p-6 transition-all duration-300">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2" id="form-title">
                    <i class="fa-solid fa-plus-circle text-blue-500"></i> הוספת משימה חדשה
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div id="parent-assign-container" class="sm:col-span-2 hidden bg-purple-50 p-4 rounded-xl border border-purple-100 mb-2">
                        <label class="block text-sm font-medium text-purple-800 mb-2"><i class="fa-solid fa-user-plus"></i> שיוך המשימה:</label>
                        <div class="flex gap-2">
                            <select id="task-assignee" class="flex-grow border border-purple-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-purple-500 bg-white">
                                <option value="me">אלי (ברירת מחדל)</option>
                            </select>
                            <input type="text" id="task-new-assignee" placeholder="הקלד שם..." class="flex-grow border border-purple-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-purple-500 hidden">
                            <button type="button" id="btn-toggle-new-user" onclick="toggleNewAssignee()" class="bg-purple-200 text-purple-800 px-4 py-2 rounded-xl text-sm hover:bg-purple-300 transition-colors whitespace-nowrap">
                                <i class="fa-solid fa-plus"></i> חדש
                            </button>
                        </div>
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">כותרת המשימה</label>
                        <input type="text" id="task-title" placeholder="למשל: לקנות חלב..." class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">תאריך</label>
                        <input type="date" id="task-date" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">שעה</label>
                        <input type="time" id="task-time" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">תזכורת (קופצת)</label>
                        <select id="task-reminder" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="-1">ללא תזכורת</option>
                            <option value="0">בזמן המשימה</option>
                            <option value="5">5 דקות לפני</option>
                            <option value="15">15 דקות לפני</option>
                        </select>
                    </div>
                    <div>
                        <label class="flex justify-between items-center text-sm font-medium text-gray-700 mb-1">
                            <span>צליל תזכורת</span>
                            <button type="button" onclick="testTaskSound()" class="text-blue-500 hover:text-blue-700 text-xs flex items-center gap-1"><i class="fa-solid fa-volume-high"></i> בדיקה</button>
                        </label>
                        <select id="task-sound" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="speech">הקראת שם המשימה (קולי)</option>
                            <option value="classic">קלאסי</option>
                            <option value="bell">פעמון</option>
                            <option value="long5">ממושך (5 שניות)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">חזרתיות</label>
                        <select id="task-recurrence" onchange="toggleRecurrenceDays()" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="none">חד פעמי</option>
                            <option value="daily">כל יום</option>
                            <option value="weekly">בימים נבחרים</option>
                        </select>
                    </div>
                    <div id="recurrence-days" class="sm:col-span-2 hidden bg-gray-50 p-3 rounded-xl border border-gray-200">
                        <div class="flex flex-wrap gap-2">
                            <label><input type="checkbox" value="0" class="recurrence-day text-blue-600 rounded mr-1"> א'</label>
                            <label><input type="checkbox" value="1" class="recurrence-day text-blue-600 rounded mr-1"> ב'</label>
                            <label><input type="checkbox" value="2" class="recurrence-day text-blue-600 rounded mr-1"> ג'</label>
                            <label><input type="checkbox" value="3" class="recurrence-day text-blue-600 rounded mr-1"> ד'</label>
                            <label><input type="checkbox" value="4" class="recurrence-day text-blue-600 rounded mr-1"> ה'</label>
                            <label><input type="checkbox" value="5" class="recurrence-day text-blue-600 rounded mr-1"> ו'</label>
                            <label><input type="checkbox" value="6" class="recurrence-day text-blue-600 rounded mr-1"> ש'</label>
                        </div>
                    </div>
                </div>
                <div class="mt-5 flex gap-3">
                    <button id="btn-save-task" onclick="saveTask()" class="flex-grow bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-medium shadow-sm transition-colors">
                        <i class="fa-solid fa-check"></i> שמור משימה
                    </button>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2.5 rounded-xl font-medium">ביטול</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 sm:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">רשימת משימות</h2>
                    <button id="btn-parent-mode" onclick="openPinModal()" class="text-sm text-gray-500 hover:text-purple-600 transition-colors flex items-center gap-1 px-2 py-1 rounded-md">
                        <i class="fa-solid fa-lock"></i> מצב הורה
                    </button>
                </div>
                <div id="tasks-parent-filter" class="hidden w-full mb-4 bg-purple-50 p-3 rounded-xl border border-purple-100 flex items-center justify-between">
                    <span class="text-sm font-medium text-purple-800"><i class="fa-solid fa-filter"></i> סנן משתמש:</span>
                    <select id="task-filter-user" onchange="renderTasks()" class="border border-purple-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-purple-500 bg-white">
                        <option value="all">כל המשפחה</option>
                    </select>
                </div>
                <div id="tasks-container" class="space-y-3">
                    <div class="text-center text-gray-500 py-8 hidden" id="empty-tasks">
                        <p>אין משימות קרובות.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Timer Section (Hidden to save space, logic intact) -->
        <div id="view-timer" class="hidden space-y-6">
             <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center"><p class="text-gray-500">טיימר</p></div>
        </div>
    </main>

    <!-- Modals -->
    <div id="custom-modal" class="fixed inset-0 bg-gray-900/50 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm" id="custom-modal-content">
            <h3 class="text-xl font-bold mb-2" id="modal-title">כותרת</h3>
            <p class="text-gray-600 mb-6" id="modal-text">תוכן</p>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white py-2 rounded-lg">הבנתי</button>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-gray-900/50 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h3 class="text-xl font-bold text-center mb-2">מצב הורה</h3>
            <p class="text-gray-500 mb-6 text-sm text-center">סיסמה: 1234</p>
            <input type="password" id="pin-input" class="w-full border rounded-xl px-4 py-3 mb-6 text-center text-2xl tracking-[0.5em] font-mono">
            <div class="flex gap-3">
                <button onclick="submitPin()" class="flex-grow bg-purple-600 text-white py-3 rounded-xl font-bold">אישור</button>
                <button onclick="closePinModal()" class="bg-gray-200 text-gray-700 px-4 py-3 rounded-xl font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <div id="user-setup-modal" class="fixed inset-0 bg-gray-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-md hidden transition-opacity">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden">
            <div class="pt-8 px-6 pb-8 text-center">
                <h3 class="text-2xl font-bold mb-2">ברוכים הבאים!</h3>
                <p class="text-gray-500 mb-6 text-sm">איך קוראים לך?</p>
                <input type="text" id="user-name-input" placeholder="למשל: אבא" class="w-full px-4 py-3 bg-gray-50 border rounded-xl mb-6 text-right font-medium">
                <button onclick="saveUserName()" class="w-full py-3.5 bg-blue-600 text-white font-bold rounded-xl shadow-md">בואו נתחיל</button>
            </div>
        </div>
    </div>

    <script>
        let synth = null, synths = {}, tasks = [], editingTaskId = null;
        let currentUserName = localStorage.getItem('matmon_user_name') || "";
        let parentMode = false;

        window.getUserId = function() {
            if (window.firebaseInitialized && window.firebaseUid) return window.firebaseUid;
            let uid = localStorage.getItem('matmon_local_uid');
            if (!uid) { uid = 'local_' + Date.now(); localStorage.setItem('matmon_local_uid', uid); }
            return uid;
        };

        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            document.getElementById('task-date').value = now.toISOString().split('T')[0];
            document.getElementById('task-time').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            if (!currentUserName) document.getElementById('user-setup-modal').classList.remove('hidden');
            loadTasks();
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") { Notification.requestPermission(); }
            setInterval(checkReminders, 10000);
            setInterval(renderTodayTasks, 60000);
        });

        // AUDIO & UI FUNCTIONS (Kept brief for space)
        function initAudio() { if (!synth) { synth = new Tone.Synth().toDestination(); Tone.start(); } }
        function switchTab(tabId) {
            ['today', 'tasks', 'timer'].forEach(id => {
                document.getElementById(`view-${id}`).classList.add('hidden');
                document.getElementById(`tab-btn-${id}`).className = 'tab-inactive font-medium h-full px-2 border-b-2 transition-colors flex items-center gap-2';
            });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tabId}`).className = 'tab-active font-medium h-full px-2 border-b-2 transition-colors flex items-center gap-2';
            if (tabId === 'today') renderTodayTasks();
            if (tabId === 'tasks') renderTasks();
        }
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])); }
        function showModal(title, text) { document.getElementById('modal-title').textContent = title; document.getElementById('modal-text').textContent = text; document.getElementById('custom-modal').classList.remove('opacity-0', 'pointer-events-none'); }
        function closeModal() { document.getElementById('custom-modal').classList.add('opacity-0', 'pointer-events-none'); }
        function openPinModal() { if (parentMode) { parentMode = false; updateParentUI(); renderTasks(); renderTodayTasks(); return; } document.getElementById('pin-input').value = ''; document.getElementById('pin-modal').classList.remove('opacity-0', 'pointer-events-none'); }
        function closePinModal() { document.getElementById('pin-modal').classList.add('opacity-0', 'pointer-events-none'); }
        
        function saveUserName() {
            const input = document.getElementById('user-name-input').value.trim();
            if (input.length < 2) return; currentUserName = escapeHTML(input); localStorage.setItem('matmon_user_name', currentUserName); document.getElementById('user-setup-modal').classList.add('hidden');
            tasks.forEach(t => { if (!t.ownerId) { t.ownerId = window.getUserId(); t.ownerName = currentUserName; if(window.saveTaskToCloud) window.saveTaskToCloud(t); } });
            saveTasks(); renderTasks(); renderTodayTasks();
        }

        function submitPin() { if (document.getElementById('pin-input').value === "1234") { parentMode = true; closePinModal(); updateParentUI(); renderTasks(); renderTodayTasks(); } }

        function updateParentUI() {
            const btn = document.getElementById('btn-parent-mode');
            if (parentMode) {
                btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> מצב הורה (פעיל)';
                document.getElementById('parent-assign-container').classList.remove('hidden');
                document.getElementById('tasks-parent-filter').classList.remove('hidden');
                document.getElementById('today-parent-filter').classList.remove('hidden');
                populateUserDropdowns();
            } else {
                btn.innerHTML = '<i class="fa-solid fa-lock"></i> מצב הורה';
                document.getElementById('parent-assign-container').classList.add('hidden');
                document.getElementById('tasks-parent-filter').classList.add('hidden');
                document.getElementById('today-parent-filter').classList.add('hidden');
            }
        }

        function populateUserDropdowns() {
            const uniqueUsers = new Map(); uniqueUsers.set(window.getUserId(), currentUserName || "אני");
            tasks.forEach(t => { if (t.ownerId && t.ownerName) uniqueUsers.set(t.ownerId, t.ownerName); });
            const optionsHTML = `<option value="all">כל המשפחה</option>` + Array.from(uniqueUsers).map(([id, name]) => `<option value="${id}">${name}</option>`).join('');
            document.getElementById('task-filter-user').innerHTML = optionsHTML; document.getElementById('today-filter-user').innerHTML = optionsHTML;
            document.getElementById('task-assignee').innerHTML = `<option value="me">אלי (ברירת מחדל)</option>` + Array.from(uniqueUsers).filter(([id])=>id!==window.getUserId()).map(([id, name]) => `<option value="${id}">${name}</option>`).join('');
        }

        function toggleNewAssignee() {
            const select = document.getElementById('task-assignee'), input = document.getElementById('task-new-assignee');
            if (input.classList.contains('hidden')) { select.classList.add('hidden'); input.classList.remove('hidden'); } else { input.classList.add('hidden'); select.classList.remove('hidden'); input.value = ''; }
        }

        function loadTasks() { try { tasks = JSON.parse(localStorage.getItem('matmon_tasks')) || []; } catch(e) { tasks = []; } renderTasks(); renderTodayTasks(); }
        function saveTasks() { localStorage.setItem('matmon_tasks', JSON.stringify(tasks)); }

        window.updateTasksFromCloud = function(cloudTasks) { tasks = cloudTasks; saveTasks(); renderTasks(); renderTodayTasks(); if(parentMode) populateUserDropdowns(); };

        function toggleRecurrenceDays() { document.getElementById('recurrence-days').classList.toggle('hidden', document.getElementById('task-recurrence').value !== 'weekly'); }

        function saveTask() {
            const title = document.getElementById('task-title').value.trim(), date = document.getElementById('task-date').value, time = document.getElementById('task-time').value;
            if (!title || !date || !time) return showModal('שגיאה', 'אנא מלא את כל השדות');
            
            let finalOwnerId = window.getUserId(), finalOwnerName = currentUserName || "משתמש";
            if (parentMode && !editingTaskId) {
                const selectEl = document.getElementById('task-assignee'), inputEl = document.getElementById('task-new-assignee');
                if (!inputEl.classList.contains('hidden') && inputEl.value.trim() !== '') { finalOwnerName = escapeHTML(inputEl.value.trim()); finalOwnerId = 'user_' + Date.now(); } 
                else if (selectEl.value !== 'me') { finalOwnerId = selectEl.value; finalOwnerName = selectEl.options[selectEl.selectedIndex].text; }
            }

            const taskData = {
                id: editingTaskId || Date.now().toString(), title: escapeHTML(title), date, time, 
                reminderOffset: document.getElementById('task-reminder').value, sound: document.getElementById('task-sound').value, 
                recurrenceType: document.getElementById('task-recurrence').value,
                recurrenceDays: Array.from(document.querySelectorAll('.recurrence-day:checked')).map(cb => cb.value),
                notified: false, isCompleted: false, ownerId: finalOwnerId, ownerName: finalOwnerName
            };

            if (editingTaskId) { const idx = tasks.findIndex(t => t.id === editingTaskId); if (idx !== -1) tasks[idx] = { ...tasks[idx], ...taskData }; cancelEdit(); } 
            else { tasks.push(taskData); document.getElementById('task-title').value = ''; }
            
            saveTasks(); renderTasks(); renderTodayTasks();
            
            // שולח לענן אם מחובר!
            if (window.saveTaskToCloud) {
                const taskToSave = editingTaskId ? tasks.find(t=>t.id===editingTaskId) : taskData;
                window.saveTaskToCloud(taskToSave);
            }
        }

        function editTask(id) { const t = tasks.find(x => x.id === id); if (!t) return; document.getElementById('task-title').value = t.title; document.getElementById('task-date').value = t.date; document.getElementById('task-time').value = t.time; document.getElementById('task-reminder').value = t.reminderOffset || "-1"; document.getElementById('task-sound').value = t.sound || "speech"; document.getElementById('task-recurrence').value = t.recurrenceType || "none"; toggleRecurrenceDays(); editingTaskId = id; document.getElementById('btn-save-task').innerHTML = 'שמור שינויים'; document.getElementById('btn-cancel-edit').classList.remove('hidden'); }
        function cancelEdit() { editingTaskId = null; document.getElementById('btn-save-task').innerHTML = 'שמור משימה'; document.getElementById('btn-cancel-edit').classList.add('hidden'); }
        function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); saveTasks(); if(window.deleteTaskFromCloud) window.deleteTaskFromCloud(id); renderTasks(); renderTodayTasks(); }
        function completeTask(id) {
            const task = tasks.find(t => t.id === id); if(!task) return;
            if (task.recurrenceType && task.recurrenceType !== 'none') { let d = new Date(`${task.date}T${task.time}`); if (task.recurrenceType === 'daily') d.setDate(d.getDate() + 1); task.date = d.toISOString().split('T')[0]; task.notified = false; } else task.isCompleted = true;
            saveTasks(); if(window.saveTaskToCloud) window.saveTaskToCloud(task); renderTasks(); renderTodayTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasks-container'); Array.from(container.children).forEach(c => { if(c.id !== 'empty-tasks') c.remove(); });
            const filterId = parentMode ? document.getElementById('task-filter-user').value : 'all';
            const toRender = tasks.filter(t => !parentMode ? t.ownerId === window.getUserId() : (filterId === 'all' || t.ownerId === filterId)).sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            document.getElementById('empty-tasks').classList.toggle('hidden', toRender.length > 0);
            toRender.forEach(task => {
                const el = document.createElement('div'); el.className = `flex flex-col sm:flex-row items-center justify-between p-4 ${task.isCompleted ? 'bg-gray-100 opacity-70' : 'bg-gray-50'} border rounded-xl gap-4`;
                el.innerHTML = `<div class="flex-grow w-full"><h3 class="font-bold text-lg ${task.isCompleted ? 'line-through text-gray-400' : ''}">${task.title} ${(parentMode && task.ownerName) ? `<span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full text-xs ml-2">${task.ownerName}</span>` : ''}</h3><div class="text-sm text-gray-500 mt-2">${task.date.split('-').reverse().join('/')} | ${task.time}</div></div><div class="flex gap-2"> ${!task.isCompleted ? `<button onclick="completeTask('${task.id}')" class="bg-green-100 text-green-700 p-2.5 rounded-lg"><i class="fa-solid fa-check"></i></button><button onclick="editTask('${task.id}')" class="bg-yellow-100 text-yellow-700 p-2.5 rounded-lg"><i class="fa-solid fa-pen"></i></button>` : ''}<button onclick="deleteTask('${task.id}')" class="bg-red-50 text-red-500 p-2.5 rounded-lg"><i class="fa-solid fa-trash"></i></button></div>`;
                container.appendChild(el);
            });
        }

        function renderTodayTasks() {
            const container = document.getElementById('today-tasks-container'); if (!container) return; Array.from(container.children).forEach(c => { if(c.id !== 'empty-today-tasks') c.remove(); });
            const now = new Date(), todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            const filterId = parentMode ? document.getElementById('today-filter-user').value : 'all';
            const toRender = tasks.filter(t => t.date === todayStr && (!parentMode ? t.ownerId === window.getUserId() : (filterId === 'all' || t.ownerId === filterId))).sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            document.getElementById('empty-today-tasks').classList.toggle('hidden', toRender.length > 0);
            toRender.forEach(task => {
                const el = document.createElement('div'); el.className = `flex items-center justify-between p-4 ${task.isCompleted ? 'bg-gray-100 opacity-60' : 'bg-blue-50'} border rounded-xl gap-4`;
                el.innerHTML = `<div class="flex-grow"><h3 class="font-bold text-lg ${task.isCompleted ? 'line-through text-gray-500' : 'text-blue-800'}">${task.title}</h3><div class="text-sm text-blue-600 mt-1">${task.time}</div></div>${!task.isCompleted ? `<button onclick="completeTask('${task.id}')" class="bg-white text-green-600 p-2.5 rounded-lg border shadow-sm"><i class="fa-solid fa-check"></i></button>` : ''}`;
                container.appendChild(el);
            });
        }

        function checkReminders() {} // Placeholder for brevity
    </script>

    <!-- Cloud Sync Connection (עם המפתחות המעודכנים שלך) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // שתלתי לך את המפתחות ששלחת לי ישירות פה!
        const firebaseConfig = {
          apiKey: "AIzaSyB8geSwKTWETbYE_mBEu1JECduqQIJy5Lc",
          authDomain: "matmon-task.firebaseapp.com",
          projectId: "matmon-task",
          storageBucket: "matmon-task.firebasestorage.app",
          messagingSenderId: "158594235258",
          appId: "1:158594235258:web:e80ca16380f5ada5c374c3",
          measurementId: "G-HFMKX74LZ0"
        };

        window.firebaseInitialized = false;

        async function initFirebase() {
            const statusEl = document.getElementById('cloud-status');
            statusEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-blue-500"></i> מתחבר...';

            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app);
                
                await signInAnonymously(auth);
                
                window.firebaseUid = auth.currentUser.uid;
                window.firebaseInitialized = true;
                statusEl.innerHTML = '<i class="fa-solid fa-cloud text-green-500"></i> מחובר לענן';
                
                onSnapshot(collection(db, 'tasks'), (snapshot) => {
                    const loadedTasks = [];
                    snapshot.forEach(doc => loadedTasks.push(doc.data()));
                    if (typeof window.updateTasksFromCloud === 'function') window.updateTasksFromCloud(loadedTasks);
                });

                window.saveTaskToCloud = async (task) => await setDoc(doc(db, 'tasks', task.id), task);
                window.deleteTaskFromCloud = async (taskId) => await deleteDoc(doc(db, 'tasks', taskId));
                
                // שליחת כל המשימות הקיימות בפעם הראשונה שמתחברים
                if (tasks && tasks.length > 0) {
                    tasks.forEach(t => window.saveTaskToCloud(t));
                }

            } catch (e) { 
                console.error("Firebase error:", e); 
                statusEl.innerHTML = `<i class="fa-solid fa-cloud-xmark text-red-500" title="שגיאה: ${e.message}"></i> שגיאה בחיבור`;
            }
        }
        
        // התחלת חיבור
        initFirebase();
    </script>
