<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון - ניהול חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-press { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white shadow-md p-4 flex justify-around sticky top-0 z-50">
        <button onclick="showTab('view-today')" class="text-blue-600 font-bold"><i class="fa-solid fa-calendar-day"></i> היום</button>
        <button onclick="showTab('view-tasks')" class="text-blue-600 font-bold"><i class="fa-solid fa-list-check"></i> משימות</button>
        <button onclick="showTab('view-timer')" class="text-blue-600 font-bold"><i class="fa-solid fa-stopwatch"></i> טיימר</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <div id="view-tasks" class="tab-content active space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <h2 class="text-lg font-bold mb-3">הוספת משימה</h2>
                <input type="text" id="task-title" placeholder="כותרת המשימה" class="w-full border p-3 rounded-xl mb-2">
                <div class="flex gap-2">
                    <input type="date" id="task-date" class="border p-2 rounded-xl flex-1">
                    <input type="time" id="task-time" class="border p-2 rounded-xl flex-1">
                </div>
                <select id="task-sound" class="w-full border p-3 rounded-xl mt-2">
                    <option value="bell">פעמון עדין</option>
                    <option value="alert">התראה דחופה</option>
                    <option value="soft">צליל רגוע</option>
                </select>
                <button id="save-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl mt-4 font-bold shadow-lg">שמור משימה</button>
            </div>
            <div id="tasks-list" class="space-y-2"></div>
        </div>
    </main>

    <script>
        // ניהול צלילים
        async function playSound(type) {
            await Tone.start();
            const synth = new Tone.Synth().toDestination();
            if(type === 'bell') synth.triggerAttackRelease("C5", "8n");
            else if(type === 'alert') synth.triggerAttackRelease("E5", "4n");
            else synth.triggerAttackRelease("G4", "2n");
        }

        // ניהול טאבים
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // שמירה ורינדור
        document.getElementById('save-btn').addEventListener('click', () => {
            const task = {
                id: Date.now(),
                title: document.getElementById('task-title').value,
                sound: document.getElementById('task-sound').value
            };
            // כאן תתבצע השמירה ל-Firebase ששמת ב-Rules
            alert("המשימה נשמרה והתראה תופעל בזמן!");
            playSound(task.sound);
            render();
        });

        function render() {
            // טעינת משימות מ-Firebase/LocalStorage
        }
    </script>
</body>
</html>
