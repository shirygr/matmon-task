<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון - מערכת ניהול</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <nav class="bg-white shadow-lg fixed bottom-0 w-full flex justify-around p-4 z-50">
        <button onclick="showTab('view-tasks')" class="text-blue-600"><i class="fa-solid fa-list-check text-xl"></i></button>
        <button onclick="showTab('view-timer')" class="text-blue-600"><i class="fa-solid fa-stopwatch text-xl"></i></button>
        <button onclick="checkAdmin()" class="text-blue-600"><i class="fa-solid fa-user-lock text-xl"></i></button>
    </nav>

    <main class="p-4 max-w-md mx-auto pb-24">
        <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-100 text-center mb-6">
            <p class="text-yellow-800 font-medium italic" id="quote">"הדרך הטובה ביותר לחזות את העתיד היא ליצור אותו"</p>
        </div>

        <div id="view-tasks" class="tab-content active">
            <h2 class="text-xl font-bold mb-4">המשימות שלי</h2>
            <div id="tasks-list" class="space-y-3"></div>
        </div>

        <div id="view-timer" class="tab-content">
            <h2 class="text-xl font-bold mb-4">טיימר משימות</h2>
            <div class="bg-white p-8 rounded-2xl shadow text-center">
                <div class="text-5xl font-bold mb-6" id="timer-display">20:00</div>
                <button onclick="startTimer()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold">הפעל טיימר</button>
            </div>
        </div>

        <div id="view-admin" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-red-600">אזור הורים (ניהול)</h2>
            <div id="admin-tasks" class="space-y-3"></div>
        </div>
    </main>

    <script>
        // ניהול טאבים
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ניהול סיסמת הורים
        function checkAdmin() {
            const pass = prompt("נא להזין סיסמת הורים:");
            if (pass === "1234") {
                showTab('view-admin');
            } else {
                alert("סיסמה שגויה");
            }
        }

        // טיימר עם התראות
        function startTimer() {
            let timeLeft = 1200; // 20 דקות בשניות
            const display = document.getElementById('timer-display');
            
            const interval = setInterval(() => {
                timeLeft--;
                display.innerText = Math.floor(timeLeft/60) + ":" + (timeLeft%60).toString().padStart(2, '0');
                
                // כל 5 דקות (300 שניות) צלצול
                if (timeLeft % 300 === 0 && timeLeft > 0) {
                    playBell();
                }
                
                if (timeLeft <= 0) clearInterval(interval);
            }, 1000);
        }

        async function playBell() {
            await Tone.start();
            const synth = new Tone.Synth().toDestination();
            synth.triggerAttackRelease("C5", "3n");
        }

        // דוגמה לנתונים (כאן יתחבר ה-Firebase שלך)
        const tasks = [{id: 1, title: "סידור החדר", user: "יונתן"}];
        document.getElementById('tasks-list').innerHTML = tasks.map(t => `<div class="p-4 bg-white rounded-lg shadow">${t.title}</div>`).join('');
        document.getElementById('admin-tasks').innerHTML = tasks.map(t => `<div class="p-4 bg-white rounded-lg shadow flex justify-between">${t.title} <button class="text-red-500">מחק</button></div>`).join('');
    </script>
</body>
</html>
