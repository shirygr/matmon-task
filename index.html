<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון - גרסה יציבה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white p-4 shadow-sm flex items-center justify-between">
        <h1 class="text-lg font-bold">משפחת מטמון</h1>
        <div id="status" class="text-xs text-gray-400">מתחבר...</div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border">
            <input type="text" id="task-title" placeholder="כותרת משימה..." class="w-full border-b p-2 outline-none mb-2">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="task-date" class="border rounded p-2">
                <input type="time" id="task-time" class="border rounded p-2">
            </div>
            <select id="task-sound" class="w-full border rounded p-2 mt-2">
                <option value="speech">הקראה קולית</option>
                <option value="classic">קלאסי</option>
                <option value="bell">פעמון</option>
            </select>
            <button id="btn-save-task" class="w-full bg-blue-600 text-white py-3 rounded-xl mt-4 font-bold">שמור משימה</button>
        </div>
        <div id="tasks-container" class="space-y-2"></div>
    </main>

    <script>
        // לוגיקה משופרת - בידוד תקלות
        const initApp = () => {
            const btn = document.getElementById('btn-save-task');
            
            btn.addEventListener('click', () => {
                const title = document.getElementById('task-title').value;
                const date = document.getElementById('task-date').value;
                const time = document.getElementById('task-time').value;

                if (!title || !date || !time) {
                    alert("נא למלא כותרת, תאריך ושעה!");
                    return;
                }

                // יצירת משימה
                const newTask = {
                    id: Date.now().toString(),
                    title: title,
                    date: date,
                    time: time,
                    sound: document.getElementById('task-sound').value,
                    createdAt: new Date().toISOString()
                };

                // שמירה ל-LocalStorage מיידית
                let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
                tasks.push(newTask);
                localStorage.setItem('tasks', JSON.stringify(tasks));

                // איפוס שדות
                document.getElementById('task-title').value = '';
                alert("המשימה נשמרה בהצלחה!");
                renderTasks();
            });
        };

        function renderTasks() {
            const container = document.getElementById('tasks-container');
            const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            container.innerHTML = tasks.map(t => `
                <div class="bg-white p-3 rounded-lg flex justify-between items-center shadow-sm">
                    <div><p class="font-bold">${t.title}</p><p class="text-xs text-gray-500">${t.date} ${t.time}</p></div>
                    <button onclick="deleteTask('${t.id}')" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        window.deleteTask = (id) => {
            let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        };

        document.addEventListener('DOMContentLoaded', initApp);
        renderTasks();
    </script>
</body>
</html>
