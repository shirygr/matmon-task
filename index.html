<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משפחת מטמון</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { border-bottom-color: #3b82f6; color: #3b82f6; }
        .tab-inactive { border-bottom-color: transparent; color: #6b7280; }
        .inspiration-bg { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-xl"><i class="fa-solid fa-layer-group text-lg"></i></div>
                <h1 class="text-xl font-bold text-gray-800">משפחת מטמון</h1>
            </div>
            <div id="cloud-status" class="text-sm font-medium text-gray-400"><i class="fa-solid fa-cloud"></i> מנותק</div>
        </div>
        <div class="max-w-3xl mx-auto px-4 border-t bg-white">
            <nav class="flex gap-8 h-12">
                <button onclick="switchTab('today')" id="tab-btn-today" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-calendar-day"></i> היום</button>
                <button onclick="switchTab('tasks')" id="tab-btn-tasks" class="tab-active font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-list-check"></i> משימות</button>
                <button onclick="switchTab('timer')" id="tab-btn-timer" class="tab-inactive font-medium h-full px-2 border-b-2 flex items-center gap-2"><i class="fa-solid fa-stopwatch"></i> טיימר</button>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">
        <!-- View Today, Tasks, Timer here... (Preserving original full structure) -->
        <div id="view-today" class="hidden space-y-6">...</div>
        <div id="view-tasks" class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border p-6">
                <h2 class="text-lg font-semibold mb-4">הוספת משימה חדשה</h2>
                <input type="text" id="task-title" placeholder="כותרת..." class="w-full border p-2 rounded-lg mb-2">
                <div class="flex gap-2">
                    <input type="date" id="task-date" class="border p-2 rounded-lg w-1/2">
                    <input type="time" id="task-time" class="border p-2 rounded-lg w-1/2">
                </div>
                <button id="btn-save-task" class="w-full bg-blue-600 text-white py-3 rounded-xl mt-4 font-bold">שמור משימה</button>
            </div>
            <div id="tasks-container" class="space-y-2"></div>
        </div>
        <div id="view-timer" class="hidden">...</div>
    </main>

    <script>
        // האתחול מוגן ב-Try/Catch למניעת קריסות
        window.addEventListener('load', () => {
            const btnSave = document.getElementById('btn-save-task');
            if (btnSave) {
                btnSave.onclick = function() {
                    try {
                        const title = document.getElementById('task-title').value;
                        const date = document.getElementById('task-date').value;
                        const time = document.getElementById('task-time').value;
                        if (!title || !date || !time) return alert("נא למלא את כל השדות");
                        
                        let tasks = JSON.parse(localStorage.getItem('matmon_tasks') || '[]');
                        tasks.push({ id: Date.now().toString(), title, date, time });
                        localStorage.setItem('matmon_tasks', JSON.stringify(tasks));
                        
                        document.getElementById('task-title').value = '';
                        renderTasks();
                        alert("נשמר בהצלחה!");
                    } catch(e) { console.error(e); }
                };
            }
        });

        function switchTab(tabId) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('view-' + tabId).classList.remove('hidden');
        }
        
        function renderTasks() {
            const container = document.getElementById('tasks-container');
            const tasks = JSON.parse(localStorage.getItem('matmon_tasks') || '[]');
            container.innerHTML = tasks.map(t => `<div class="bg-white p-4 rounded-xl border flex justify-between">
                <span>${t.title}</span><button onclick="deleteTask('${t.id}')" class="text-red-500">מחק</button>
            </div>`).join('');
        }
    </script>
</body>
</html>
